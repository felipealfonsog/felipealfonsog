name: Render Inline Icons

on:
  workflow_dispatch:
    inputs:
      display_mode:
        description: "none | links | full_image"
        required: false
        default: "links"
      hide_when_source_down:
        description: "true | false"
        required: false
        default: "true"
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: render-inline-icons
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      SOURCE_URL: "https://gnlz.cl/svg1.html"
      FULL_IMAGE_URL: "https://raw.githubusercontent.com/felipealfonsog/felipealfonsog/refs/heads/master/images/icons1inline-full.png"
      DISPLAY_MODE: ${{ inputs.display_mode || 'links' }}
      HIDE_WHEN_SOURCE_DOWN: ${{ inputs.hide_when_source_down || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render README icons block
        run: python scripts/render_icons.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "Update inline icons block"
          git push
