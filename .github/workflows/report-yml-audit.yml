name: Secure Repo Audit Reports

on:
  workflow_dispatch:
  schedule:
    # Cada 1 hora:
    # - cron: "0 * * * *"

    # 1 vez al día:
    - cron: "0 6 * * *"

    # 3 días a la semana:
    # - cron: "0 6 * * 1,3,5"

permissions:
  contents: write

env:
  GITHUB_OWNER: felipealfonsog
  AUDIT_REPORT_DIR: auditreports

  AUDIT_KEEP_HISTORY: "true"
  AUDIT_WRITE_LATEST: "true"

  # Seguridad
  AUDIT_INCLUDE_PRIVATE_REPOS: "false"
  AUDIT_MAX_SNIPPET_CHARS: "120"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Generate secure audit report
        env:
          AUDIT_TOKEN: ${{ secrets.AUDIT_TOKEN }}
        run: |
          mkdir -p "$AUDIT_REPORT_DIR"

          python3 <<'PY'
          import os
          import re
          import json
          import base64
          import urllib.request
          import urllib.parse
          from datetime import datetime, timezone

          OWNER = os.environ["GITHUB_OWNER"]
          TOKEN = os.environ["AUDIT_TOKEN"]
          REPORT_DIR = os.environ.get("AUDIT_REPORT_DIR", "auditreports")
          KEEP_HISTORY = os.environ.get("AUDIT_KEEP_HISTORY", "true").lower() == "true"
          WRITE_LATEST = os.environ.get("AUDIT_WRITE_LATEST", "true").lower() == "true"
          INCLUDE_PRIVATE = os.environ.get("AUDIT_INCLUDE_PRIVATE_REPOS", "false").lower() == "true"
          MAX_SNIPPET = int(os.environ.get("AUDIT_MAX_SNIPPET_CHARS", "120"))

          now = datetime.now(timezone.utc)
          stamp = now.strftime("%Y-%m-%d-%H%M")
          now_text = now.strftime("%Y-%m-%d %H:%M:%S UTC")

          latest_path = os.path.join(REPORT_DIR, "report-yml-audit-latest.md")
          historical_path = os.path.join(REPORT_DIR, f"report-yml-audit-{stamp}.md")
          overwrite_path = os.path.join(REPORT_DIR, "report-yml-audit.md")

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "felipealfonsog-secure-audit"
          }

          AUDIT_PATTERNS = [
              ("GITHUB_TOKEN usage", re.compile(r"\bGITHUB_TOKEN\b")),
              ("ghs token prefix assumption", re.compile(r"\bghs_")),
              ("token length check", re.compile(r"len\s*\(\s*[^)]*token[^)]*\)", re.I)),
              ("token slicing", re.compile(r"\btoken\b\s*\[\s*:\s*\d+\s*\]", re.I)),
              ("token substring", re.compile(r"\.substring\s*\(\s*0\s*,\s*\d+\s*\)", re.I)),
              ("startswith ghs", re.compile(r"startswith\s*\(\s*['\"]ghs_", re.I)),
              ("startsWith ghs", re.compile(r"startsWith\s*\(\s*['\"]ghs_", re.I)),
              ("regex token logic", re.compile(r"re\.match|RegExp|regexp|regex", re.I)),
              ("small token column", re.compile(r"VARCHAR\s*\(\s*(32|40|48|64|80|128|255)\s*\)", re.I)),
          ]

          SECRET_PATTERNS = [
              re.compile(r"github_pat_[A-Za-z0-9_]{20,}"),
              re.compile(r"gh[pousr]_[A-Za-z0-9_]{20,}"),
              re.compile(r"ghs_[A-Za-z0-9._-]{20,}"),
              re.compile(r"Bearer\s+[A-Za-z0-9._\-]{20,}", re.I),
              re.compile(r"token\s*[:=]\s*['\"][^'\"]{12,}['\"]", re.I),
              re.compile(r"api[_-]?key\s*[:=]\s*['\"][^'\"]{12,}['\"]", re.I),
              re.compile(r"secret\s*[:=]\s*['\"][^'\"]{12,}['\"]", re.I),
              re.compile(r"password\s*[:=]\s*['\"][^'\"]{8,}['\"]", re.I),
          ]

          EXTENSIONS = {
              ".yml", ".yaml", ".py", ".js", ".ts", ".tsx", ".jsx",
              ".sh", ".bash", ".zsh", ".php", ".rb", ".go", ".rs",
              ".java", ".kt", ".cs", ".c", ".cpp", ".h", ".hpp",
              ".sql", ".env", ".txt", ".md", ".json", ".toml"
          }

          MAX_FILE_SIZE = 1_000_000

          def redact(text):
              safe = text
              for pattern in SECRET_PATTERNS:
                  safe = pattern.sub("[REDACTED_SECRET]", safe)
              return safe

          def escape_md(text):
              return text.replace("|", "\\|").replace("\n", " ").replace("\r", " ")

          def safe_snippet(line):
              return escape_md(redact(line.strip()))[:MAX_SNIPPET]

          def request_json(url):
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode("utf-8"))

          def paginated(url):
              out = []
              while url:
                  req = urllib.request.Request(url, headers=HEADERS)
                  with urllib.request.urlopen(req, timeout=30) as res:
                      out.extend(json.loads(res.read().decode("utf-8")))
                      link = res.headers.get("Link", "")

                  url = None
                  for part in link.split(","):
                      if 'rel="next"' in part:
                          url = part[part.find("<")+1:part.find(">")]
              return out

          def get_repos():
              url = "https://api.github.com/user/repos?per_page=100&affiliation=owner,collaborator,organization_member&sort=updated"
              repos = paginated(url)
              clean = []
              for repo in repos:
                  if repo.get("fork"):
                      continue
                  if repo.get("private") and not INCLUDE_PRIVATE:
                      continue
                  clean.append(repo)
              return clean

          def get_tree(owner, repo, branch):
              branch = urllib.parse.quote(branch, safe="")
              url = f"https://api.github.com/repos/{owner}/{repo}/git/trees/{branch}?recursive=1"
              return request_json(url).get("tree", [])

          def get_file(owner, repo, path, ref):
              path_q = urllib.parse.quote(path)
              ref_q = urllib.parse.quote(ref, safe="")
              url = f"https://api.github.com/repos/{owner}/{repo}/contents/{path_q}?ref={ref_q}"
              data = request_json(url)
              if data.get("encoding") != "base64":
                  return ""
              return base64.b64decode(data["content"]).decode("utf-8", errors="ignore")

          def interesting(path):
              _, ext = os.path.splitext(path)
              return ext in EXTENSIONS or path.startswith(".github/workflows/")

          repos = get_repos()
          findings = []
          scanned_files = 0
          skipped_files = 0
          failed_repos = []

          for repo in repos:
              name = repo["name"]
              owner = repo["owner"]["login"]
              branch = repo.get("default_branch") or "master"
              visibility = "private" if repo.get("private") else "public"

              try:
                  tree = get_tree(owner, name, branch)
              except Exception as e:
                  failed_repos.append((name, "tree read failed"))
                  continue

              for item in tree:
                  if item.get("type") != "blob":
                      continue

                  path = item.get("path", "")
                  size = item.get("size", 0)

                  if not interesting(path):
                      continue

                  if size and size > MAX_FILE_SIZE:
                      skipped_files += 1
                      continue

                  try:
                      content = get_file(owner, name, path, branch)
                  except Exception:
                      skipped_files += 1
                      continue

                  scanned_files += 1

                  for line_no, line in enumerate(content.splitlines(), 1):
                      redacted_line = redact(line)

                      for label, pattern in AUDIT_PATTERNS:
                          if pattern.search(redacted_line):
                              findings.append({
                                  "repo": name,
                                  "visibility": visibility,
                                  "path": path,
                                  "line": line_no,
                                  "label": label,
                                  "snippet": safe_snippet(line),
                              })

          high_labels = {
              "token length check",
              "token slicing",
              "token substring",
              "startswith ghs",
              "startsWith ghs",
              "small token column",
          }

          high = [f for f in findings if f["label"] in high_labels]

          md = []
          md.append("# Secure GitHub Token / YAML Audit Report")
          md.append("")
          md.append("```text")
          md.append(f"Generated:             {now_text}")
          md.append(f"Owner:                 {OWNER}")
          md.append(f"Private repos scanned: {'yes' if INCLUDE_PRIVATE else 'no'}")
          md.append(f"Repos scanned:         {len(repos)}")
          md.append(f"Files scanned:         {scanned_files}")
          md.append(f"Files skipped:         {skipped_files}")
          md.append(f"Findings:              {len(findings)}")
          md.append(f"High risk:             {len(high)}")
          md.append("Secret redaction:      enabled")
          md.append("```")
          md.append("")

          md.append("## Status")
          md.append("")
          md.append("```text")
          md.append("STATUS: REVIEW REQUIRED" if high else "STATUS: OK / NO HIGH-RISK TOKEN FORMAT ASSUMPTIONS DETECTED")
          md.append("```")
          md.append("")

          md.append("## High-Risk Findings")
          md.append("")
          if high:
              md.append("| Repo | Visibility | File | Line | Type | Redacted snippet |")
              md.append("|---|---|---|---:|---|---|")
              for f in high:
                  md.append(f"| `{f['repo']}` | `{f['visibility']}` | `{f['path']}` | `{f['line']}` | `{f['label']}` | `{f['snippet']}` |")
          else:
              md.append("_No high-risk findings._")
          md.append("")

          md.append("## All Findings")
          md.append("")
          if findings:
              md.append("| Repo | Visibility | File | Line | Type | Redacted snippet |")
              md.append("|---|---|---|---:|---|---|")
              for f in findings:
                  md.append(f"| `{f['repo']}` | `{f['visibility']}` | `{f['path']}` | `{f['line']}` | `{f['label']}` | `{f['snippet']}` |")
          else:
              md.append("_No findings._")
          md.append("")

          if failed_repos:
              md.append("## Failed Repositories")
              md.append("")
              md.append("| Repo | Error |")
              md.append("|---|---|")
              for repo, err in failed_repos:
                  md.append(f"| `{repo}` | `{escape_md(err)}` |")
              md.append("")

          md.append("## Security Notes")
          md.append("")
          md.append("- Report snippets are redacted before being written.")
          md.append("- `GITHUB_TOKEN` usage alone is not an error.")
          md.append("- Risk appears when code assumes fixed token length, prefix, regex shape, truncation, or small storage.")
          md.append("- GitHub tokens should be treated as opaque strings.")
          md.append("- For maximum safety, keep `AUDIT_INCLUDE_PRIVATE_REPOS` as `false` unless you explicitly want private repo names and paths in the report.")
          md.append("")

          content = "\n".join(md)

          if KEEP_HISTORY:
              with open(historical_path, "w", encoding="utf-8") as f:
                  f.write(content)

          if WRITE_LATEST:
              with open(latest_path, "w", encoding="utf-8") as f:
                  f.write(content)

          if not KEEP_HISTORY:
              with open(overwrite_path, "w", encoding="utf-8") as f:
                  f.write(content)
          PY

      - name: Commit audit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet auditreports; then
            echo "No audit report changes."
            exit 0
          fi

          git add auditreports
          git commit -m "Update secure audit reports"
          git push
