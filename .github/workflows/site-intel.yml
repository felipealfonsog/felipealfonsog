name: GNLZ Site Intel

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site-intel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor

      - name: Start Tor
        run: |
          sudo systemctl start tor || true
          sleep 8
          ss -ltnp | grep 9050 || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data files exist
        run: |
          mkdir -p data
          test -f data/analytics.json || echo '{"views_24h": null, "views_7d": null, "uniques_24h": null, "bot_ratio": null}' > data/analytics.json
          test -f data/last_probe.json || echo '{}' > data/last_probe.json

      - name: Generate CLI block
        run: |
          python scripts/site_intel.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/last_probe.json
          git diff --cached --quiet || git commit -m "Update GNLZ site intelligence"
          git push
