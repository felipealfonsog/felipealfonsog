name: GNLZ Site Intel

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gnlz-site-intel
  cancel-in-progress: false

jobs:
  update-site-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tor

      - name: Start Tor daemon
        run: |
          sudo systemctl start tor || true
          sleep 8
          ss -ltn | grep 9050 || true

      - name: Prepare project directories
        run: |
          mkdir -p data scripts .github/workflows

      - name: Create default analytics file if missing
        run: |
          if [ ! -f data/analytics.json ]; then
            cat > data/analytics.json <<'JSON'
          {
            "views_24h": 1284,
            "views_7d": 6882,
            "uniques_24h": 402,
            "bot_ratio": 11.8
          }
          JSON
          fi

      - name: Create empty cache file if missing
        run: |
          if [ ! -f data/last_probe.json ]; then
            echo '{}' > data/last_probe.json
          fi

      - name: Ensure requirements.txt exists
        run: |
          if [ ! -f requirements.txt ]; then
            cat > requirements.txt <<'REQ'
          requests[socks]==2.32.3
          REQ
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate site intelligence block
        run: |
          python scripts/site_intel.py

      - name: Show resulting telemetry block
        run: |
          echo "----- last_probe.json -----"
          cat data/last_probe.json || true
          echo
          echo "----- README marker check -----"
          grep -n "GNLZ:SITE_INTEL" README.md || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md data/last_probe.json data/analytics.json requirements.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update GNLZ site intelligence"
          git push
