name: Spotify endpoint healthcheck

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC diario (ajusta si quieres)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run healthcheck
        run: python scripts/spotify_healthcheck.py

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/spotify-live.svg
          git commit -m "chore: spotify-live svg healthcheck"
          git push
